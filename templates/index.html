<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 40px;
            max-width: 540px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .h1-icon {
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .supported-sites {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .site-tag {
            font-size: 11px;
            padding: 4px 10px;
            background: #f0f0f0;
            border-radius: 12px;
            color: #666;
        }

        .site-tag .icon {
            margin-right: 4px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #6366f1;
        }

        button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        button:hover {
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
            box-shadow: none;
        }

        .format-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .format-option {
            flex: 1;
            position: relative;
        }

        .format-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .format-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
        }

        .format-option input[type="radio"]:checked + .format-label {
            border-color: #6366f1;
            background: #f5f5ff;
            color: #6366f1;
        }

        .format-label:hover {
            border-color: #6366f1;
        }

        .format-icon {
            font-size: 16px;
        }

        /* Progress container */
        .progress-container {
            margin-top: 20px;
            display: none;
        }

        .progress-container.active {
            display: block;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .progress-info {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            font-size: 13px;
            color: #666;
        }

        .progress-info-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .progress-info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
        }

        .progress-info-value {
            font-weight: 600;
            color: #1a1a2e;
        }

        /* Status messages */
        .status-message {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }

        .status-message.downloading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status-message.complete {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-message.error {
            background: #ffebee;
            color: #c62828;
        }

        /* Animation */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .live-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        .info-text {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="h1-icon">🎬</span> Video Downloader</h1>
        <p class="subtitle">Download videos from 1000+ sites - paste any URL below</p>

        <div class="supported-sites" id="supportedSites">
            <!-- Populated by JS -->
        </div>

        <div class="input-group">
            <input
                type="text"
                id="urlInput"
                placeholder="Paste video URL from any site..."
                autofocus
            >
            <button id="downloadBtn" onclick="startDownload()">Download</button>
        </div>

        <div class="format-selector">
            <div class="format-option">
                <input type="radio" name="format" id="formatMp4" value="mp4" checked>
                <label class="format-label" for="formatMp4">
                    <span class="format-icon">🎬</span>
                    MP4 Video
                </label>
            </div>
            <div class="format-option">
                <input type="radio" name="format" id="formatMp3" value="mp3">
                <label class="format-label" for="formatMp3">
                    <span class="format-icon">🎵</span>
                    MP3 Audio
                </label>
            </div>
        </div>

        <!-- Progress Section -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBar"></div>
            </div>

            <div class="progress-info">
                <div class="progress-info-item">
                    <span class="progress-info-label">Progress</span>
                    <span class="progress-info-value" id="progressPercent">0%</span>
                </div>
                <div class="progress-info-item">
                    <span class="progress-info-label">Speed</span>
                    <span class="progress-info-value" id="progressSpeed">--</span>
                </div>
                <div class="progress-info-item">
                    <span class="progress-info-label">ETA</span>
                    <span class="progress-info-value" id="progressEta">--</span>
                </div>
            </div>

            <div class="progress-info" style="margin-top: 10px;">
                <div class="progress-info-item">
                    <span class="progress-info-label">Downloaded</span>
                    <span class="progress-info-value" id="progressDownloaded">--</span>
                </div>
                <div class="progress-info-item">
                    <span class="progress-info-label">Total Size</span>
                    <span class="progress-info-value" id="progressSize">--</span>
                </div>
                <div class="progress-info-item">
                    <span class="progress-info-label">Status</span>
                    <span class="progress-info-value" id="progressStatus"><span class="live-indicator"></span>Starting</span>
                </div>
            </div>

            <div class="status-message" id="statusMessage"></div>
        </div>

        <p class="info-text">Files download directly to your device — nothing stored on the server.</p>
    </div>

    <script>
        let pollInterval = null;

        async function loadSupportedSites() {
            try {
                const res = await fetch('/supported-sites');
                const sites = await res.json();
                const container = document.getElementById('supportedSites');
                container.innerHTML = sites.map(s =>
                    `<span class="site-tag"><span class="icon">${s.icon}</span>${s.name}</span>`
                ).join('');
            } catch (err) {
                console.error('Failed to load supported sites', err);
            }
        }

        async function startDownload() {
            const url = document.getElementById('urlInput').value.trim();
            const format = document.querySelector('input[name="format"]:checked').value;
            if (!url) return;

            const btn = document.getElementById('downloadBtn');
            const progressContainer = document.getElementById('progressContainer');

            btn.disabled = true;
            progressContainer.classList.add('active');
            resetProgress();

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format })
                });

                const data = await res.json();
                if (data.error) {
                    throw new Error(data.error);
                }

                pollStatus(data.download_id);

            } catch (err) {
                showStatus('error', 'Error: ' + err.message);
                btn.disabled = false;
            }
        }

        async function pollStatus(downloadId) {
            const btn = document.getElementById('downloadBtn');

            pollInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/status/${downloadId}`);
                    const data = await res.json();

                    if (data.status === 'downloading' || data.status === 'processing') {
                        updateProgress(data);
                    } else if (data.status === 'complete') {
                        clearInterval(pollInterval);
                        updateProgress(data);
                        showStatus('complete', '✓ Download starting to your device!');
                        btn.disabled = false;
                        document.getElementById('urlInput').value = '';

                        // Trigger browser download
                        triggerDownload(downloadId);
                    } else if (data.status === 'error') {
                        clearInterval(pollInterval);
                        showStatus('error', 'Error: ' + data.error);
                        btn.disabled = false;
                    }

                } catch (err) {
                    clearInterval(pollInterval);
                    showStatus('error', 'Error checking status');
                    btn.disabled = false;
                }
            }, 500);
        }

        function triggerDownload(downloadId) {
            const a = document.createElement('a');
            a.href = `/stream/${downloadId}`;
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => a.remove(), 1000);
        }

        function updateProgress(data) {
            const progress = data.progress || '0';
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressPercent').textContent = progress + '%';
            document.getElementById('progressSpeed').textContent = data.speed || '--';
            document.getElementById('progressEta').textContent = data.eta || '--';
            document.getElementById('progressDownloaded').textContent = data.downloaded || '--';
            document.getElementById('progressSize').textContent = data.size || '--';

            const statusEl = document.getElementById('progressStatus');
            if (data.status === 'downloading') {
                statusEl.innerHTML = '<span class="live-indicator"></span>Downloading';
            } else if (data.status === 'processing') {
                statusEl.innerHTML = '<span class="live-indicator"></span>Processing';
            } else if (data.status === 'complete') {
                statusEl.textContent = 'Complete';
            }
        }

        function resetProgress() {
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('progressPercent').textContent = '0%';
            document.getElementById('progressSpeed').textContent = '--';
            document.getElementById('progressEta').textContent = '--';
            document.getElementById('progressDownloaded').textContent = '--';
            document.getElementById('progressSize').textContent = '--';
            document.getElementById('progressStatus').innerHTML = '<span class="live-indicator"></span>Starting';
            document.getElementById('statusMessage').style.display = 'none';
        }

        function showStatus(type, message) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.className = 'status-message ' + type;
            statusEl.textContent = message;
            statusEl.style.display = 'block';
        }

        // Allow Enter key to start download
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') startDownload();
        });

        // Initialize
        loadSupportedSites();
    </script>
</body>
</html>
