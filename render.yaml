services:
  # Sibling of open-canvas-studio-api — same Render deploy convention.
  - type: web
    name: resource-shrimp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      # The sibling app (Open Canvas Studio) — powers the room switcher.
      - key: SIBLING_OCS_URL
        value: https://reyanda.github.io/open-canvas-studio/
      # Google Drive sync (optional). Set these in the Render dashboard to
      # activate; leave unset and the Drive feature stays hidden/disabled.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_BASE
        sync: false
      # Google Drive sync (optional). Set these in the Render dashboard to
      # activate; leave unset and the Drive feature stays hidden/disabled.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_BASE
        sync: false
