services:
  - type: web
    name: resource-shrimp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: SIBLING_OCS_URL
        value: https://reyanda.github.io/open-canvas-studio/
      - key: CORS_ORIGINS
        value: https://reyanda.github.io
      # Google OAuth — set these in the Render dashboard (Env tab).
      # They are secrets so they must NOT appear in render.yaml.
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: OAUTH_REDIRECT_BASE
        sync: false
